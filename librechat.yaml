version: 1.3.11
cache: true

interface:
  endpointsMenu: true
  modelSelect: true
  parameters: true      
  sidePanel: true
  presets: true
  bookmarks: true
  multiConvo: true
  artifacts: true      
  agents:
    use: true
    create: true       

mcpServers:
  google-drive:
    type: streamable-http
    url: "https://composio.dev"
    headers:
      x-api-key: "${COMPOSIO_API_KEY}"
    timeout: 60000

  web-fetch:
    type: streamable-http
    url: "https://mcp-server-fetch.api.smithery.ai"
    timeout: 60000

webSearch:
  searchProvider: "tavily"
  tavilyApiKey: "${TAVILY_API_KEY}"

fileConfig:
  endpoints:
    assistants:
      fileLimit: 10
      fileSizeLimit: 104857600 
    agents:
      fileLimit: 20
      fileSizeLimit: 104857600
  serverFileSizeLimit: 104857600

endpoints:
  anthropic:
    apiKey: "${ANTHROPIC_API_KEY}"
    fetch: true                     

  google:
    apiKey: "${GOOGLE_API_KEY}"
    fetch: true                     

  agents:
    disableBuilder: false

  custom:
    - name: "DeepSeek"
      type: "openai"
      apiKey: "${DEEPSEEK_API_KEY}"
      baseURL: "https://deepseek.com"
      fetch: true                      
      titleConvo: true
