# LibreChat Configuration
# https://www.librechat.ai/docs/configuration/librechat_yaml
version: "1.3.11"
cache: true

# =============================================================================
# Interface
# =============================================================================
interface:
  endpointsMenu: true
  modelSelect: true
  parameters: true
  sidePanel: true
  presets: true
  bookmarks: true
  multiConvo: true
  artifacts: true
  agents:
    use: true
    create: true

# =============================================================================
# MCP Settings (SSRF whitelist pro lokální adresy)
# =============================================================================
mcpSettings:
  allowedAddresses:
    - "127.0.0.1:3001"
    - "host.docker.internal:8080"

# =============================================================================
# MCP Servers
# =============================================================================
mcpServers:
  # FIXME: Nahraď URL správným MCP endpointem z Composio dashboardu
  # Vypadá typicky jako: https://mcp.composio.dev/googledrive/<tvuj-hash>
  google-drive:
    type: "streamable-http"
    url: "https://mcp.composio.dev/googledrive/VLOZ-SVUJ-COMPOSIO-ENDPOINT"
    headers:
      x-api-key: "${COMPOSIO_API_KEY}"
    timeout: 60000

  # Lokální web-fetch server
  web-fetch:
    type: "streamable-http"
    url: "http://127.0.0.1:3001"
    timeout: 60000

# =============================================================================
# Endpoints
# =============================================================================
endpoints:
  anthropic:
    apiKey: "${ANTHROPIC_API_KEY}"
    fetch: true
  google:
    apiKey: "${GOOGLE_SEARCH_API_KEY}"
    fetch: true
  agents:
    disableBuilder: false
  custom:
    - name: "DeepSeek"
      type: "openai"
      apiKey: "${DEEPSEEK_API_KEY}"
      baseURL: "https://api.deepseek.com"
      models:
        default:
          - "deepseek-chat"
          - "deepseek-reasoner"
        fetch: false
      titleConvo: true
      titleModel: "deepseek-chat"
      modelDisplayLabel: "DeepSeek"

# =============================================================================
# Web Search
# =============================================================================
webSearch:
  searchProvider: "tavily"
  tavilyApiKey: "${TAVILY_API_KEY}"

# =============================================================================
# File Config
# =============================================================================
fileConfig:
  serverFileSizeLimit: 104857600
  endpoints:
    assistants:
      fileLimit: 10
      fileSizeLimit: 104857600
    agents:
      fileLimit: 20
      fileSizeLimit: 104857600
