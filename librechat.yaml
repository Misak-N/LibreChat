# LibreChat Configuration
# https://www.librechat.ai/docs/configuration/librechat_yaml
version: "1.3.11"
cache: true

# =============================================================================
# Interface
# =============================================================================
interface:
  endpointsMenu: true
  modelSelect: true
  parameters: true
  sidePanel: true
  presets: true
  bookmarks: true
  multiConvo: true
  artifacts: true
  agents:
    use: true
    create: true

# =============================================================================
# MCP Settings
# =============================================================================
mcpSettings:
  allowedAddresses:
    - "host.docker.internal:8080"

# =============================================================================
# MCP Servers
# =============================================================================
# mcpServers:
#  web-fetch:
#   type: "streamable-http"
#    url: "https://mcp-server-fetch.api.smithery.ai"
#    timeout: 60000

# =============================================================================
# Memory — AI si pamatuje tvoje preference mezi konverzacemi
# Pouziva Groq (Llama 3.1 8B) jako memory agenta — zdarma
# =============================================================================
memory:
  disabled: false
  personalize: true
  tokenLimit: 3000
  messageWindowSize: 5
  validKeys:
    - "preferences"
    - "personal_info"
    - "work_info"
    - "skills"
    - "interests"
    - "context"
  agent:
    enabled: true
    provider: "Groq"
    model: "llama-3.1-8b-instant"
    instructions: |
      You are a memory management assistant. Store information using only these keys:
      - preferences: communication style, language, workflow preferences
      - personal_info: name, location, explicitly shared personal details
      - work_info: job, projects, tools used
      - skills: technical skills, expertise areas
      - interests: hobbies, topics of interest
      - context: ongoing projects, important facts
      Only store what the user explicitly shares. Delete outdated information.
    model_parameters:
      temperature: 0.1
      max_tokens: 1000

# =============================================================================
# Endpoints
# =============================================================================
endpoints:
  # ---------- Anthropic ----------
  anthropic:
    apiKey: "${ANTHROPIC_API_KEY}"
    fetch: true

  # ---------- Google Gemini ----------
  # Free tier: 1500 req/den, 1M tokenu/min
  # API klic: https://aistudio.google.com/apikey
  # V Railway Variables: GOOGLE_SEARCH_API_KEY=tvuj-klic
  google:
    apiKey: "${GOOGLE_SEARCH_API_KEY}"
    fetch: true

  # ---------- Agents ----------
  agents:
    disableBuilder: false

  # ---------- Custom endpointy ----------
  custom:
    # ========== DeepSeek ==========
    # API klic: https://platform.deepseek.com
    # V Railway Variables: DEEPSEEK_API_KEY=tvuj-klic
    - name: "DeepSeek"
      type: "openai"
      apiKey: "${DEEPSEEK_API_KEY}"
      baseURL: "https://api.deepseek.com"
      models:
        default:
          - "deepseek-chat"
          - "deepseek-reasoner"
        fetch: false
      titleConvo: true
      titleModel: "deepseek-chat"
      modelDisplayLabel: "DeepSeek"

    # ========== Groq ==========
    # Vsechny modely zdarma, rate limity per model
    # API klic: https://console.groq.com
    # V Railway Variables: GROQ_API_KEY=tvuj-klic
    - name: "Groq"
      apiKey: "${GROQ_API_KEY}"
      baseURL: "https://api.groq.com/openai/v1/"
      models:
        default:
          - "llama-3.3-70b-versatile"
          - "llama-3.1-8b-instant"
          - "qwen/qwen3-32b"
          - "meta-llama/llama-4-scout-17b-16e-instruct"
          - "openai/gpt-oss-20b"
          - "openai/gpt-oss-120b"
          - "mixtral-8x7b-32768"
          - "gemma2-9b-it"
        fetch: false
      titleConvo: true
      titleModel: "llama-3.1-8b-instant"
      modelDisplayLabel: "Groq"

    # ========== Mistral ==========
    # API klic: https://console.mistral.ai
    # V Railway Variables: MISTRAL_API_KEY=tvuj-klic
    - name: "Mistral"
      apiKey: "${MISTRAL_API_KEY}"
      baseURL: "https://api.mistral.ai/v1"
      models:
        default:
          - "mistral-small-latest"
          - "codestral-latest"
          - "mistral-medium-latest"
        fetch: true
      titleConvo: true
      titleModel: "mistral-small-latest"
      modelDisplayLabel: "Mistral"
      dropParams: ["stop", "user", "frequency_penalty", "presence_penalty"]

    # ========== OpenRouter ==========
    # Registrace: https://openrouter.ai -> Keys
    # V Railway Variables: OPENROUTER_KEY=tvuj-klic
    - name: "OpenRouter"
      apiKey: "${OPENROUTER_KEY}"
      baseURL: "https://openrouter.ai/api/v1"
      models:
        default:
          - "meta-llama/llama-3-70b-instruct"
        fetch: true
      titleConvo: true
      titleModel: "meta-llama/llama-3-70b-instruct"
      dropParams: ["stop"]
      modelDisplayLabel: "OpenRouter"

# =============================================================================
# Web Search
# =============================================================================
webSearch:
  searchProvider: "tavily"
  tavilyApiKey: "${TAVILY_API_KEY}"

# =============================================================================
# File Config
# =============================================================================
fileConfig:
  serverFileSizeLimit: 104857600
  endpoints:
    assistants:
      fileLimit: 10
      fileSizeLimit: 104857600
    agents:
      fileLimit: 20
      fileSizeLimit: 104857600
