version: 1.3.11
cache: true

# 1. SEKCE: ROZHRANÍ (ZAPÍNÁ GRAFICKÉ PRVKY A ARTIFACTS)
interface:
  endpointsMenu: true
  modelSelect: true
  parameters: true      
  sidePanel: true
  presets: true
  bookmarks: true
  multiConvo: true
  artifacts: true      
  agents:
    use: true
    create: true       

# 2. SEKCE: ROZŠÍŘENÉ MCP SERVERY (ZAFIXOVANÉ ADRESY)
mcpServers:
  google-drive:
    type: streamable-http
    url: "https://composio.dev"
    headers:
      x-api-key: "${COMPOSIO_API_KEY}"
    timeout: 60000

  web-fetch:
    type: streamable-http
    url: "https://smithery.ai"
    timeout: 60000

# 3. SEKCE: WEBOVÉ VYHLEDÁVÁNÍ TAVILY
webSearch:
  searchProvider: "tavily"
  tavilyApiKey: "${TAVILY_API_KEY}"

# 4. SEKCE: STRATEGIE PRO SOUBORY (RAG)
fileConfig:
  endpoints:
    assistants:
      fileLimit: 10
      fileSizeLimit: 104857600 
    agents:
      fileLimit: 20
      fileSizeLimit: 104857600
  serverFileSizeLimit: 104857600

# 5. SEKCE: SEZNAM AI MODELŮ (AUTOMATIKA PRO VAŠI VERZI)
endpoints:
  anthropic:
    apiKey: "${ANTHROPIC_API_KEY}"
    fetch: true                     

  google:
    apiKey: "${GOOGLE_API_KEY}"
    fetch: true                     

  agents:
    disableBuilder: false

  # VRÁCENO: Funkční zápis přes custom pro DeepSeek
  custom:
    - name: "DeepSeek"
      type: "openai"
      apiKey: "${DEEPSEEK_API_KEY}"
      baseURL: "https://deepseek.com"
      fetch: true                      
      titleConvo: true
