version: "1.3.11"
cache: true

interface:
  endpointsMenu: true
  modelSelect: true
  parameters: true
  sidePanel: true
  presets: true
  bookmarks: true
  multiConvo: true
  artifacts: true
  agents:
    use: true
    create: true

mcpSettings:
  allowedAddresses:
    - "127.0.0.1:3001"            # Pro lokální web-fetch
    - "host.docker.internal:8080" # Pokud běžíte v Dockeru a MCP je na hostitelském PC

mcpServers:
  google-drive:
    type: "streamable-http"
    url: "https://composio.dev"
    headers:
      x-api-key: "${COMPOSIO_API_KEY}"
    timeout: 60000

  web-fetch:
    type: "streamable-http"
    url: "http://127.0.0"
    timeout: 60000

endpoints:
  anthropic:
    apiKey: "${ANTHROPIC_API_KEY}"
    fetch: true
  google:
    apiKey: "${GOOGLE_SEARCH_API_KEY}"
    fetch: true
  custom:
    - name: "DeepSeek"
      type: "openai"
      apiKey: "${DEEPSEEK_API_KEY}"
      baseURL: "https://deepseek.com"
      fetch: true
      titleConvo: true

webSearch:
  searchProvider: "tavily"
  tavilyApiKey: "${TAVILY_API_KEY}"

fileConfig:
  serverFileSizeLimit: 104857600
  endpoints:
    assistants:
      fileLimit: 10
      fileSizeLimit: 104857600
    agents:
      fileLimit: 20
      fileSizeLimit: 104857600
