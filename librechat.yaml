version: "1.2.5"
cache: true

# 1. SEKCE: AKTIVACE VŠECH GRAFICKÝCH FUNKCÍ (VČETNĚ ARTEFAKTŮ)
interface:
  endpointsMenu: true
  modelSelect: true
  parameters: true      
  sidePanel: true
  agentBuilder: true   
  artifacts: true      # ZAPÍNÁ INTERAKTIVNÍ BOČNÍ OKNO (CLAUDE ARTIFACTS)

# 2. SEKCE: NASTAVENÍ STRATEGIE PRO SOUBORY A VELKOU PAMĚŤ (RAG)
fileConfig:
  endpoints:
    assistants:
      fileLimit: 10
      fileSizeLimit: 104857600 # 100 MB na soubor
    agents:
      fileLimit: 20
      fileSizeLimit: 104857600
  serverFileSizeLimit: 104857600

endpoints:
  anthropic:
    apiKey: "${ANTHROPIC_API_KEY}"
    models:
      - "claude-3-5-sonnet-latest"
      - "claude-3-5-haiku-latest"
    fetch: true
  google:
    apiKey: "${GOOGLE_API_KEY}"
    models:
      - "gemini-2.5-flash"
      - "gemini-2.5-pro"
    fetch: true
  agents:
    disableBuilder: false
  custom:
    - name: "DeepSeek Chat"
      type: "openai"
      apiKey: "${DEEPSEEK_API_KEY}"
      baseURL: "https://deepseek.com"  # ZACHOVÁNO: Vaše funkční adresa
      models:
        default: ["deepseek-chat"]
        fetch: false
      titleConvo: true
      titleModel: "deepseek-chat"
      modelDisplayLabel: "DeepSeek Chat"
    - name: "DeepSeek Reasoner"
      type: "openai"
      apiKey: "${DEEPSEEK_API_KEY}"
      baseURL: "https://deepseek.com"  # ZACHOVÁNO: Vaše funkční adresa
      models:
        default: ["deepseek-reasoner"]
        fetch: false
      titleConvo: true
      titleModel: "deepseek-reasoner"
      modelDisplayLabel: "DeepSeek Reasoner"
      
# 3. SEKCE: ROZŠÍŘENÉ MCP SERVERY (PŘIDÁN TIMEOUT PROTI PÁDŮM)
mcpServers:
  google-drive:
    type: streamable-http
    url: "https://composio.dev"
    headers:
      x-api-key: "${COMPOSIO_API_KEY}"
    timeout: 60000  # NAVÝŠENO PRO STABILITU

  web-fetch:
    type: streamable-http
    url: "https://smithery.ai"
    timeout: 60000  # NAVÝŠENO: Server nyní dostane čas se spojit a nespadne

# 4. SEKCE: AKTIVACE GLOBÁLNÍHO WEBOVÉHO VYHLEDÁVÁNÍ PŘES TAVILY
webSearch:
  searchProvider: "tavily"
  tavilyApiKey: "${TAVILY_API_KEY}"
