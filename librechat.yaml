version: 1.3.11
cache: true

# 1. SEKCE: AKTIVACE VŠECH GRAFICKÝCH FUNKCÍ PODLE OFICIÁLNÍHO VZORU
interface:
  endpointsMenu: true
  modelSelect: true
  parameters: true      
  sidePanel: true
  presets: true
  bookmarks: true
  multiConvo: true
  artifacts: true      # Ponecháno: Aktivace interaktivního bočního okna
  agents:
    use: true
    create: true       # Zapíná plnohodnotný Agent Builder v menu

# 2. SEKCE: NASTAVENÍ STRATEGIE PRO SOUBORY A VELKOU PAMĚŤ (RAG)
fileConfig:
  endpoints:
    assistants:
      fileLimit: 10
      fileSizeLimit: 104857600 # 100 MB na soubor
    agents:
      fileLimit: 20
      fileSizeLimit: 104857600
  serverFileSizeLimit: 104857600

endpoints:
  # AUTOMATICKÉ STAŽENÍ VŠECH MODELŮ CLAUDE (VRÁTÍ SE VÁM KOMPLETNÍ NABÍDKA)
  anthropic:
    apiKey: "${ANTHROPIC_API_KEY}"
    fetch: true                     # Zde se vymazal ruční seznam, servery načtou vše samy
  google:
    apiKey: "${GOOGLE_API_KEY}"
    models:
      - "gemini-2.5-flash"
      - "gemini-2.5-pro"
    fetch: true
  agents:
    disableBuilder: false
  custom:
    - name: "DeepSeek Chat"
      type: "openai"
      apiKey: "${DEEPSEEK_API_KEY}"
      baseURL: "https://deepseek.com"  # Zachováno: Vaše funkční adresa
      models:
        default: ["deepseek-chat"]
        fetch: false
      titleConvo: true
      titleModel: "deepseek-chat"
      modelDisplayLabel: "DeepSeek Chat"
    - name: "DeepSeek Reasoner"
      type: "openai"
      apiKey: "${DEEPSEEK_API_KEY}"
      baseURL: "https://deepseek.com"  # Zachováno: Vaše funkční adresa
      models:
        default: ["deepseek-reasoner"]
        fetch: false
      titleConvo: true
      titleModel: "deepseek-reasoner"
      modelDisplayLabel: "DeepSeek Reasoner"
      
# 3. SEKCE: ROZŠÍŘENÉ MCP SERVERY (PEVNĚ STANOVENÉ BRÁNY S TIMEOUTEM)
mcpServers:
  google-drive:
    type: streamable-http
    url: "https://composio.dev"
    headers:
      x-api-key: "${COMPOSIO_API_KEY}"
    timeout: 60000

  web-fetch:
    type: streamable-http
    url: "https://smithery.ai"
    timeout: 60000

# 4. SEKCE: AKTIVACE GLOBÁLNÍHO WEBOVÉHO VYHLEDÁVÁNÍ PŘES TAVILY
webSearch:
  searchProvider: "tavily"
  tavilyApiKey: "${TAVILY_API_KEY}"
