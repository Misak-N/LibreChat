version: "1.2.5"
cache: true

# TATO SEKCE NATVRDO ZAPNE AGENTY V LEVÉM MENU
interface:
  endpointsMenu: true
  modelSelect: true
  parameters: true      # Bez parametru se agenty nezobrazí
  sidePanel: true
  agentBuilder: true   # Zapne tvorbu agentů

endpoints:
  anthropic:
    apiKey: "${ANTHROPIC_API_KEY}"
    models:
      - "claude-3-5-sonnet-latest"
      - "claude-3-5-haiku-latest"
    fetch: true
  google:
    apiKey: "${GOOGLE_API_KEY}"
    models:
      - "gemini-2.5-flash"
      - "gemini-2.5-pro"
    fetch: true
  # TATO SEKCE AKTIVUJE PODPORU AGENTŮ V BACKENDU
  agents:
    disableBuilder: false
  custom:
    - name: "DeepSeek Chat"
      type: "openai"
      apiKey: "${DEEPSEEK_API_KEY}"
      baseURL: "https://api.deepseek.com/v1"
      models:
        default: ["deepseek-chat"]
        fetch: false
      titleConvo: true
      titleModel: "deepseek-chat"
      modelDisplayLabel: "DeepSeek Chat"
    - name: "DeepSeek Reasoner"
      type: "openai"
      apiKey: "${DEEPSEEK_API_KEY}"
      baseURL: "https://api.deepseek.com/v1"
      models:
        default: ["deepseek-reasoner"]
        fetch: false
      titleConvo: true
      titleModel: "deepseek-reasoner"
      modelDisplayLabel: "DeepSeek Reasoner"
      
mcpServers:
  google-drive:
    type: streamable-http
    url: "https://connect.composio.dev/mcp"
    headers:
      x-api-key: "${COMPOSIO_API_KEY}"
    timeout: 30000
